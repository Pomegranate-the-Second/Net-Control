events{
    worker_connections 100;
}

http {
    resolver 127.0.0.1 ipv6=off;
    
    server {
        listen 80;
        server_name rangebit.top www.rangebit.top;
        
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        
        location / {
            proxy_pass http://app:8000;
        }
    }
}